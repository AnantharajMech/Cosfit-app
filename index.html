const tdee = (w, h, a, g, goal) => {
  const bmr = g === "f" ? 10 * w + 6.25 * h - 5 * a - 161 : 10 * w + 6.25 * h - 5 * a + 5;
  return Math.round(bmr * 1.55) + ((GOALS.find(x => x.id === goal)) || { calMod: 0 }).calMod;
};

const getGreeting = (name) => {
  const hr = new Date().getHours();
  let greeting, icon, meal, tip, sticker;
  if (hr >= 5 && hr < 12) { greeting = "Good Morning"; icon = "☀️"; meal = "breakfast"; sticker = "🌅"; } 
  else if (hr >= 12 && hr < 17) { greeting = "Good Afternoon"; icon = "🌤"; meal = "lunch"; sticker = "🌞"; } 
  else if (hr >= 17 && hr < 21) { greeting = "Good Evening"; icon = "🌆"; meal = "dinner"; sticker = "🌇"; } 
  else { greeting = "Good Night"; icon = "🌙"; meal = "dinner"; sticker = "🌃"; }
  return { greeting, icon, meal, sticker };
};

            </div>
          </div>
        </div>
      )}

      {/* ── MENU TAB ── */}
      {tab === "menu" && (
        <div style={{ overflowY: "auto", height: "100%", padding: "50px 0 20px" }}>
          <div style={{ padding: "0 24px 15px" }}>
            <div style={{ ...N, color: C.w, fontSize: 30, fontWeight: 900 }}>Menu 🍽</div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, background: C.card, borderRadius: 16, padding: "14px 18px", marginTop: 18, border: `1px solid ${C.b}` }}>
              <span style={{ fontSize: 18 }}>🔍</span>
              <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search meals..." style={{ flex: 1, background: "none", color: C.w, fontSize: 15, ...F }} />
            </div>
          </div>
          <div style={{ padding: "0 24px 15px", display: "flex", gap: 10, overflowX: "auto" }}>
            {GOALS.map(g => (
              <button key={g.id} onClick={() => setMGoal(g.id)} style={{ background: mGoal === g.id ? "rgba(74,222,128,0.15)" : C.card, border: `1.5px solid ${mGoal === g.id ? C.g : C.b}`, color: mGoal === g.id ? C.g : C.m, padding: "10px 20px", borderRadius: 22, fontWeight: 800, fontSize: 13, whiteSpace: "nowrap", ...F }}>
                {g.icon} {g.label}
              </button>
            ))}
          </div>
          <div style={{ padding: "0 24px 15px" }}>
            <div style={{ display: "flex", background: C.card, borderRadius: 18, padding: 5, gap: 4 }}>
              {MEALS.map(m => (
                <button key={m} onClick={() => setMMeal(m)} style={{ flex: 1, padding: "12px 10px", borderRadius: 14, background: mMeal === m ? C.g : "transparent", color: mMeal === m ? "#000" : C.m, fontWeight: 800, fontSize: 13, ...F }}>
                  {MIC[m]} {m.charAt(0).toUpperCase() + m.slice(1)}
                </button>
              ))}
            </div>
          </div>
          <div style={{ padding: "0 24px" }}>
            {menuItems.map((item) => {
              const q = getQty(item.id);
              return (
                <div key={item.id} style={{ background: C.card, borderRadius: 22, marginBottom: 15, border: `1px solid ${C.b}`, overflow: "hidden", display: "flex" }}>
                  <div onClick={() => setModal({ type: "item", d: item })} style={{ width: 100, background: "linear-gradient(135deg, #0c1610, #101a13)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 45, cursor: "pointer", flexShrink: 0 }}>{item.emoji}</div>
                  <div style={{ flex: 1, padding: "16px", minWidth: 0 }}>
                    <div style={{ ...N, fontWeight: 900, fontSize: 15, color: C.w }}>{item.name}</div>
                    <div style={{ fontSize: 12, color: C.m, marginTop: 4, lineHeight: 1.4 }}>{item.desc}</div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12 }}>
                      <span style={{ ...N, fontWeight: 900, fontSize: 18, color: C.o }}>₹{item.price}</span>
                      {q > 0 ? (
                        <div style={{ display: "flex", alignItems: "center", gap: 10, background: C.surf, borderRadius: 12, padding: "8px 14px" }}>
                          <button onClick={() => chgQty(item.id, -1)} style={{ background: "none", color: C.g, fontWeight: 900, fontSize: 20 }}>−</button>
                          <span style={{ color: C.w, fontWeight: 900, ...N }}>{q}</span>
                          <button onClick={() => addToCart(item)} style={{ background: "none", color: C.g, fontWeight: 900, fontSize: 20 }}>+</button>
                        </div>
                      ) : (
                        <button onClick={() => addToCart(item)} style={{ background: C.gO, color: "#fff", padding: "10px 20px", borderRadius: 12, fontWeight: 900, fontSize: 13, ...N }}>+ Add</button>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── CART TAB ── */}
      {tab === "cart" && (
        <div style={{ overflowY: "auto", height: "100%", padding: "50px 24px 20px" }}>
          <div style={{ ...N, color: C.w, fontSize: 30, fontWeight: 900, marginBottom: 20 }}>Your Cart 🛒</div>
          {cart.length === 0 ? (
            <div style={{ textAlign: "center", padding: "60px 0" }}>
              <div style={{ fontSize: 80 }}>🛒</div><div style={{ ...N, color: C.w, fontSize: 22, fontWeight: 900, marginTop: 20 }}>Cart is empty</div>
              <button onClick={() => setTab("menu")} style={{ background: C.gG, color: "#000", padding: "16px 36px", borderRadius: 18, fontWeight: 900, fontSize: 16, marginTop: 25, ...N }}>Explore Menu</button>
            </div>
          ) : (
            <div>
              {cart.map(item => (
                <div key={item.id} style={{ background: C.card, borderRadius: 20, padding: 18, marginBottom: 12, display: "flex", gap: 15, alignItems: "center", border: `1px solid ${C.b}` }}>
                  <div style={{ fontSize: 40, width: 50, textAlign: "center", flexShrink: 0 }}>{item.emoji}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ ...N, fontWeight: 900, color: C.w, fontSize: 15 }}>{item.name}</div>
                    <div style={{ ...N, color: C.o, fontWeight: 900, fontSize: 16, marginTop: 5 }}>₹{item.price * item.qty}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, background: C.surf, borderRadius: 14, padding: "10px 14px" }}>
                    <button onClick={() => chgQty(item.id, -1)} style={{ background: "none", color: C.g, fontWeight: 900, fontSize: 20 }}>−</button>
                    <span style={{ color: C.w, fontWeight: 900, ...N }}>{item.qty}</span>
                    <button onClick={() => chgQty(item.id, 1)} style={{ background: "none", color: C.g, fontWeight: 900, fontSize: 20 }}>+</button>
                  </div>
                </div>
              ))}

              <div style={{ background: C.card, borderRadius: 22, padding: 22, marginTop: 20, border: `1px solid ${C.b}` }}>
                <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 16, marginBottom: 15 }}>Bill Summary</div>
                {[["Subtotal", `₹${cartSub}`], ["Delivery", delivery === 0 ? "🎁 Free" : `₹${delivery}`], [`GST (${INIT_SETTINGS.gst}%)`, `₹${gstAmt}`], ["Platform Fee", `₹${INIT_SETTINGS.platformFee}`]].map(([l, v]) => (
                  <div key={l} style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, fontSize: 14 }}>
                    <span style={{ color: C.m, fontWeight: 600 }}>{l}</span><span style={{ color: v === "🎁 Free" ? C.g : C.w, fontWeight: 800 }}>{v}</span>
                  </div>
                ))}
                <div style={{ borderTop: `1px solid ${C.b}`, paddingTop: 15, marginTop: 5, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ ...N, color: C.w, fontWeight: 900, fontSize: 18 }}>Total</span>
                  <span style={{ ...N, color: C.o, fontWeight: 900, fontSize: 24 }}>₹{orderTotal}</span>
                </div>
              </div>

              <div style={{ background: C.card, borderRadius: 22, padding: 22, marginTop: 15, border: `1px solid ${C.b}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 15 }}>
                  <div style={{ ...N, fontWeight: 900, color: C.w, fontSize: 15 }}>📍 Delivery Address</div>
                  <button onClick={() => setTab("profile")} style={{ background: "none", color: C.g, fontSize: 13, fontWeight: 800, ...N }}>Edit</button>
                </div>
                {user?.address ? <div style={{ color: C.m, fontSize: 14, lineHeight: 1.6 }}>{user.address}</div> : <div style={{ color: C.r, fontSize: 13, fontWeight: 700 }}>Please add an address in Profile</div>}
              </div>

              <button onClick={placeOrder} style={{ width: "100%", background: C.gO, color: "#fff", padding: "20px", borderRadius: 20, fontWeight: 900, fontSize: 18, marginTop: 25, ...N, boxShadow: "0 10px 40px rgba(249,115,22,0.4)" }}>Place Order 🚀</button>
            </div>
          )}
        </div>
      )}

      {/* ── TRACK TAB ── */}
      {tab === "track" && (
        <div style={{ overflowY: "auto", height: "100%", padding: "50px 24px 20px" }}>
          <div style={{ ...N, color: C.w, fontSize: 30, fontWeight: 900 }}>Track Orders 🛵</div>
          <div style={{ color: C.m, fontSize: 14, marginTop: 5, fontWeight: 700 }}>{orders.filter(o => o.userId === user?.id).length} total · {liveOrders} live</div>
          
          <div style={{ marginTop: 25 }}>
            {orders.filter(o => o.userId === user?.id).map(order => (
              <div key={order.id} style={{ background: C.card, borderRadius: 24, marginBottom: 18, border: `1px solid ${order.statusIdx < 4 ? "rgba(74,222,128,0.4)" : C.b}`, overflow: "hidden" }}>
                <div style={{ background: "linear-gradient(135deg, #0c1610, #101a13)", padding: "18px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 15 }}>#{String(order.id).slice(-6)}</div>
                    <div style={{ color: C.m, fontSize: 12, marginTop: 4, fontWeight: 600 }}>{order.date} · {order.time}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ ...N, color: C.o, fontWeight: 900, fontSize: 20 }}>₹{order.total}</div>
                    {order.statusIdx < 4 ? <div style={{ background: "rgba(74,222,128,0.15)", color: C.g, borderRadius: 99, fontSize: 10, fontWeight: 900, padding: "4px 12px", marginTop: 6, display: "inline-block", animation: "pulse 1.5s infinite" }}>● LIVE</div> : <div style={{ color: C.g, fontSize: 12, fontWeight: 800, marginTop: 6 }}>✅ Delivered</div>}
                  </div>
                </div>
                <div style={{ padding: "20px" }}>
                  {ORDER_STEPS.map((step, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 15, marginBottom: i < 4 ? 18 : 0 }}>
                      <div style={{ width: 34, height: 34, borderRadius: "50%", background: i < order.statusIdx ? "rgba(74,222,128,0.15)" : i === order.statusIdx ? "rgba(74,222,128,0.1)" : "transparent", border: `2px solid ${i <= order.statusIdx ? C.g : C.b}`, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.5s" }}>
                        {i < order.statusIdx ? <span style={{ color: C.g, fontWeight: 900, fontSize: 14 }}>✓</span> : i === order.statusIdx ? <span style={{ fontSize: 18 }}>{step.icon}</span> : <span style={{ color: C.m, fontSize: 12, fontWeight: 800 }}>{i + 1}</span>}
                      </div>
                      <div style={{ flex: 1, paddingTop: 4 }}>
                        <div style={{ fontSize: 14, fontWeight: i === order.statusIdx ? 900 : 700, color: i <= order.statusIdx ? C.w : C.m, ...N }}>{step.label}</div>
                        {i === order.statusIdx && <div style={{ fontSize: 12, color: C.m, marginTop: 4, lineHeight: 1.5 }}>{step.msg}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── PROFILE TAB ── */}
      {tab === "profile" && (
        <div style={{ overflowY: "auto", height: "100%", paddingBottom: 20 }}>
          <div style={{ padding: "60px 24px 30px", background: "linear-gradient(180deg, #0c1610 0%, transparent 100%)", textAlign: "center" }}>
            <div style={{ fontSize: 90, background: C.gG, width: 130, height: 130, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto", boxShadow: "0 0 40px rgba(74,222,128,0.3)" }}>{user?.avatar}</div>
            <div style={{ ...N, color: C.w, fontSize: 26, fontWeight: 900, marginTop: 20 }}>{user?.name}</div>
            <div style={{ color: C.m, fontSize: 14, marginTop: 6, fontWeight: 600 }}>@{user?.username} · {user?.email}</div>
          </div>
          <div style={{ padding: "0 24px" }}>
            <div style={{ background: C.card, borderRadius: 22, padding: 20, border: `1px solid ${C.b}`, marginBottom: 20 }}>
              <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 16, marginBottom: 15 }}>📍 Delivery Address</div>
              <Field value={user?.address || ""} onChange={v => setUser(p => ({ ...p, address: v }))} rows={3} ph="Enter Full Address" />
              <button onClick={() => { syncUsersToDB(users.map(u => u.id === user.id ? { ...u, address: user.address } : u)); pop("✅ Address Saved!"); }} style={{ width: "100%", padding: "16px", background: C.gG, color: "#000", borderRadius: 14, fontWeight: 900, fontSize: 15, ...N }}>Save Address</button>
            </div>
            
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <button onClick={handleSignOut} style={{ background: "rgba(248,113,113,0.1)", border: "1px solid rgba(248,113,113,0.3)", color: C.r, padding: "18px 20px", borderRadius: 18, fontWeight: 900, fontSize: 15, display: "flex", alignItems: "center", gap: 15 }}><span style={{ fontSize: 24 }}>🚪</span> Sign Out securely</button>
            </div>
          </div>
        </div>
      )}

      {/* ── ADMIN TAB ── */}
      {tab === "admin" && isAdmin && (
        <div style={{ overflowY: "auto", height: "100%", padding: "50px 24px 20px" }}>
          <div style={{ ...N, color: C.blue, fontSize: 30, fontWeight: 900, marginBottom: 20 }}>Control Panel ⚙️</div>
          <div style={{ display: "flex", gap: 10, marginBottom: 25 }}>
            {["orders", "users"].map(t => (
              <button key={t} onClick={() => setAdminTab(t)} style={{ flex: 1, padding: "14px", borderRadius: 14, background: adminTab === t ? C.blue : C.card, color: "#fff", fontWeight: 800, textTransform: "capitalize", ...N }}>{t}</button>
            ))}
          </div>

          {adminTab === "orders" && (
            <div>
              {orders.length === 0 ? <p style={{ color: C.m, textAlign: "center", marginTop: 40 }}>No Orders Yet.</p> : orders.map(o => (
                <div key={o.id} style={{ background: C.card, borderRadius: 20, padding: 20, marginBottom: 15, border: `1px solid ${C.b}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 16 }}>Order #{String(o.id).slice(-6)}</div>
                    <div style={{ color: C.o, fontWeight: 900, fontSize: 18, ...N }}>₹{o.total}</div>
                  </div>
                  <div style={{ color: C.m, fontSize: 13, marginBottom: 15, fontWeight: 600 }}>Customer: {o.userName} · {o.userPhone}</div>
                  <div style={{ color: C.blue, fontSize: 13, fontWeight: 800, marginBottom: 15 }}>Current Status: {ORDER_STEPS[o.statusIdx]?.label}</div>
                  
                  {o.statusIdx < 4 ? (
                    <button onClick={() => updateOrder(o.id)} style={{ width: "100%", background: C.gG, color: "#000", padding: "14px", borderRadius: 14, fontWeight: 900, fontSize: 14, ...N }}>
                      Update Status to → {ORDER_STEPS[o.statusIdx + 1]?.label}
                    </button>
                  ) : (
                    <div style={{ textAlign: "center", padding: "14px", background: "rgba(74,222,128,0.1)", color: C.g, borderRadius: 14, fontWeight: 800, ...N }}>✅ Order Completely Delivered</div>
                  )}
                </div>
              ))}
            </div>
          )}

          {adminTab === "users" && (
            <div>
              {users.map(u => (
                <div key={u.id} style={{ background: C.card, borderRadius: 18, padding: 18, marginBottom: 12, border: `1px solid ${C.b}`, display: "flex", alignItems: "center", gap: 15 }}>
                  <div style={{ fontSize: 35 }}>{u.avatar}</div>
                  <div>
                    <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 16 }}>{u.name}</div>
                    <div style={{ color: C.m, fontSize: 12, marginTop: 4, fontWeight: 600 }}>{u.email} · {u.phone}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── BOTTOM NAVIGATION ── */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "rgba(6,12,8,0.97)", backdropFilter: "blur(20px)", borderTop: `1px solid ${C.b}`, display: "flex", justifyContent: "space-around", padding: "15px 0 25px", zIndex: 900 }}>
        {[["home", "🏠", "Home"], ["menu", "🍽", "Menu"], ["cart", "🛒", "Cart", cartCount], ["track", "🛵", "Track", liveOrders], ["profile", "👤", "Profile"]].map(([k, ic, l, b = 0]) => (
          <button key={k} onClick={() => setTab(k)} style={{ background: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, position: "relative" }}>
            <div style={{ fontSize: 24, opacity: tab === k ? 1 : 0.4, transition: "0.2s", transform: tab === k ? "scale(1.1)" : "scale(1)" }}>{ic}</div>
            {b > 0 && <div style={{ position: "absolute", top: -5, right: -10, background: C.r, color: "#fff", width: 18, height: 18, borderRadius: "50%", fontSize: 10, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center" }}>{b}</div>}
            <div style={{ fontSize: 10, fontWeight: tab === k ? 800 : 600, color: tab === k ? C.g : C.m, ...F }}>{l}</div>
          </button>
        ))}
        {isAdmin && <button onClick={() => setTab("admin")} style={{ background: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
          <div style={{ fontSize: 24, opacity: tab === "admin" ? 1 : 0.4, transition: "0.2s" }}>⚙️</div>
          <div style={{ fontSize: 10, fontWeight: tab === "admin" ? 800 : 600, color: tab === "admin" ? C.blue : C.m, ...F }}>Admin</div>
        </button>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
