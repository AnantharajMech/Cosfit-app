const tdee=(w,h,a,g,goal)=>{
  const bmr=g==="f"?10*w+6.25*h-5*a-161:10*w+6.25*h-5*a+5;
  return Math.round(bmr*1.55)+((GOALS.find(x=>x.id===goal))||{calMod:0}).calMod;
};

const getGreeting=(name,goal,orders)=>{
  const hr=new Date().getHours();
  const fn=name?.split(" ")[0]||"there";
  let greeting,icon,meal,tip,sticker;
  if(hr>=5&&hr<12){greeting="Good Morning";icon="☀️";meal="breakfast";sticker="🌅";tip=goal==="weight_loss"?"Start light – your detox smoothie awaits!":goal==="muscle_gain"?"Fuel up! High-protein breakfast time 💪":"Kick off your day with a healthy breakfast!";}
  else if(hr>=12&&hr<17){greeting="Good Afternoon";icon="🌤";meal="lunch";sticker="🌞";tip=goal==="weight_loss"?"Stay on track – choose your low-cal lunch!":goal==="muscle_gain"?"Lunch = muscle building time! Eat big 💪":"Keep your energy going – it's lunch time!";}
  else if(hr>=17&&hr<21){greeting="Good Evening";icon="🌆";meal="dinner";sticker="🌇";tip=goal==="weight_loss"?"Light dinner = better sleep & weight loss!":goal==="muscle_gain"?"Recovery dinner – protein is key tonight!":"Wind down with a nutritious dinner!";}
  else{greeting="Good Night";icon="🌙";meal="dinner";sticker="🌃";tip="Light meal recommended for better sleep 😴";}
  const loyalty=orders.length>=10?"🏆 Top customer!":orders.length>=5?"⭐ Loyal member!":orders.length>=2?"✨ Regular customer!":"";
  return{greeting,icon,meal,tip,sticker,loyalty,fn};
};

const getAITips=(user,orders)=>{
  const tips=[];
  const hr=new Date().getHours();
  if(!user)return[];
  if(orders.length===0)tips.push({icon:"🎯",text:"Place your first order and start your fitness journey!",color:C.g});
  if(hr>=7&&hr<9)tips.push({icon:"⚡",text:"Morning boost: Have breakfast within 1 hour of waking!",color:C.gold});
  if(user.goal==="weight_loss")tips.push({icon:"💧",text:"Drink 2-3L water today to support weight loss",color:C.blue});
  if(user.goal==="muscle_gain")tips.push({icon:"🥩",text:`Protein target: ${Math.round((+user.weight||70)*2.2)}g today`,color:C.pur});
  if(orders.length>0&&orders[0].statusIdx<4)tips.push({icon:"🛵",text:"Your latest order is being tracked live!",color:C.g});
  tips.push({icon:"📊",text:`Estimated ${Math.round(new Date().getHours()*65)} cal burned today`,color:C.g});
  return tips.slice(0,3);
};

      {children}
    </div>
  </div>;
}

function Field({label,value,onChange,type="text",ph="",rows,min,note}){
  const s={width:"100%",padding:"13px 16px",background:C.card,border:`1.5px solid ${value?"rgba(74,222,128,.5)":C.b}`,borderRadius:13,color:C.w,fontSize:14,...F,transition:"border-color .2s",boxSizing:"border-box"};
  return <div style={{width:"100%"}}>
    {label&&<div style={{fontSize:10,fontWeight:700,color:C.m,textTransform:"uppercase",letterSpacing:1.2,marginBottom:7,...F}}>{label}</div>}
    {rows?<textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={{...s,resize:"none",lineHeight:1.7}}/>
    :<input type={type} value={value} onChange={e=>onChange(type==="number"?+e.target.value:e.target.value)} placeholder={ph} min={min} style={s}/>}
    {note&&<div style={{fontSize:11,color:C.m,marginTop:5,...F}}>{note}</div>}
  </div>;
}

                    <button onClick={e=>{e.stopPropagation();addToCart(item);}} style={{background:"none",border:"none",color:C.g,fontWeight:900,fontSize:16,width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>:<button onClick={e=>{e.stopPropagation();addToCart(item);}} style={{background:C.gO,color:"#fff",border:"none",padding:"6px 12px",borderRadius:9,fontWeight:800,fontSize:11,...N}}>+ Add</button>}
                </div>

            </div>;

      {!curPlan&&<div style={{margin:"16px 22px 0",background:"linear-gradient(135deg,#0c1610,#101a13)",border:"1px solid rgba(74,222,128,.15)",borderRadius:20,padding:"18px",cursor:"pointer"}} onClick={()=>setModal({type:"sub"})}>

            <div style={{color:C.m,fontSize:12,marginTop:4}}>From ₹{plans[0]?.price}/{plans[0]?.per}</div>
          </div>
          <div style={{background:C.gG,width:54,height:54,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,boxShadow:"0 4px 24px rgba(74,222,128,.35)"}}>⚡</div>
        </div>
      </div>}
    </div>}

    {/* ══ MENU ════════════════════════════════════════════════════ */}

      </div>
      <div style={{padding:"0 22px 12px",display:"flex",gap:8,overflowX:"auto"}}>
        {GOALS.map(g=><button key={g.id} onClick={()=>setMGoal(g.id)} style={{background:mGoal===g.id?"rgba(74,222,128,.14)":C.card,border:`1.5px solid ${mGoal===g.id?C.g:C.b}`,color:mGoal===g.id?C.g:C.m,padding:"8px 16px",borderRadius:20,fontWeight:700,fontSize:12,whiteSpace:"nowrap",flexShrink:0,...F}}>{g.icon} {g.label}</button>)}

      <div style={{padding:"0 22px 14px"}}>
        <div style={{display:"flex",background:C.card,borderRadius:16,padding:4,gap:3}}>

        </div>
      </div>
      <div style={{margin:"0 22px 14px",background:C.card,borderRadius:14,padding:"11px 16px",border:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:12,color:C.m}}>🎯 Daily target</span>
        <span style={{...N,color:C.g,fontSize:14,fontWeight:800}}>{target} kcal</span>
      </div>
      <div style={{padding:"0 22px"}}>
        {menuItems.length===0&&<div style={{textAlign:"center",padding:"48px 0"}}>
          <div style={{fontSize:52}}>🔍</div>
          <div style={{color:C.m,fontSize:14,marginTop:12,...N}}>No meals found</div>
        </div>}
        {menuItems.map((item,i)=>{
          const q=getQty(item.id);
          return <div key={item.id} style={{background:C.card,borderRadius:20,marginBottom:12,border:`1px solid ${C.b}`,overflow:"hidden",display:"flex",animation:`cIn .3s ease ${i*.05}s both`}}>
            <div onClick={()=>setModal({type:"item",d:item})} style={{width:88,background:"linear-gradient(135deg,#0c1610,#101a13)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,cursor:"pointer",flexShrink:0}}>{item.emoji}</div>
            <div style={{flex:1,padding:"13px 14px 13px 12px",minWidth:0}}>
              <div style={{...N,fontWeight:800,fontSize:14,color:C.w}}>{item.name}</div>

    {/* ══ CART ════════════════════════════════════════════════════ */}

        {cart.length>0&&<div style={{color:C.m,fontSize:13,marginTop:4}}>{cartCount} items · {cart.reduce((s,i)=>s+i.cal*i.qty,0)} kcal</div>}

      </div>:<div style={{padding:"0 22px"}}>
        {cart.map(item=><div key={item.id} style={{background:C.card,borderRadius:18,padding:14,marginBottom:10,display:"flex",gap:12,alignItems:"center",border:`1px solid ${C.b}`}}>

            <button onClick={()=>chgQty(item.id,-1)} style={{background:"none",border:"none",color:C.g,fontWeight:900,fontSize:18,width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>

            <button onClick={()=>chgQty(item.id,1)} style={{background:"none",border:"none",color:C.g,fontWeight:900,fontSize:18,width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>

        </div>)}

            <span style={{color:C.m}}>{l}</span>
            <span style={{color:v==="🎁 Free"?C.g:C.w,fontWeight:600}}>{v}</span>
          </div>)}
          <div style={{borderTop:`1px solid ${C.b}`,paddingTop:12,marginTop:4,display:"flex",justifyContent:"space-between"}}>
            <span style={{...N,color:C.w,fontWeight:900,fontSize:17}}>Total</span>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{...N,fontWeight:800,color:C.w,fontSize:14}}>📍 Delivery Address</div>
            <button onClick={()=>setTab("profile")} style={{background:"none",border:"none",color:C.g,fontSize:12,fontWeight:700,...N}}>Edit →</button>
          </div>
          {user?.address?<div style={{color:C.m,fontSize:13,lineHeight:1.6}}>{user.address}</div>:
          <button onClick={()=>setTab("profile")} style={{width:"100%",background:"rgba(74,222,128,.07)",border:"1px dashed rgba(74,222,128,.3)",color:C.g,padding:"12px",borderRadius:12,fontWeight:700,fontSize:13}}>+ Add Delivery Address</button>}
        </div>
        <button onClick={placeOrder} style={{width:"100%",background:C.gO,color:"#fff",border:"none",padding:18,borderRadius:18,fontWeight:900,fontSize:16,...N,boxShadow:"0 8px 36px rgba(249,115,22,.42)"}}>🚀 Place Order</button>
      </div>}
    </div>}

    {/* ══ TRACK ═══════════════════════════════════════════════════ */}
    {tab==="track"&&<div style={{paddingBottom:90,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"52px 22px 22px"}}>
        <div style={{...N,color:C.w,fontSize:26,fontWeight:900}}>Track Orders 🛵</div>
        <div style={{color:C.m,fontSize:13,marginTop:4}}>{orders.length} total · {liveOrders} live</div>

      {orders.length===0?<div style={{textAlign:"center",padding:"60px 24px"}}>
        <div style={{fontSize:72}}>📦</div>

      </div>:<div style={{padding:"0 22px"}}>
        {orders.map(order=><div key={order.id} style={{background:C.card,borderRadius:22,marginBottom:16,border:`1px solid ${order.statusIdx<4?"rgba(74,222,128,.35)":C.b}`,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(135deg,#0c1610,#101a13)",padding:"16px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{...N,color:C.w,fontWeight:800,fontSize:14}}>#{String(order.id).slice(-8)}</div>
              <div style={{color:C.m,fontSize:11,marginTop:2}}>{order.date} · {order.time}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{...N,color:C.o,fontWeight:900,fontSize:18}}>₹{order.total}</div>
              {order.statusIdx<4?<div style={{background:"rgba(74,222,128,.15)",color:C.g,borderRadius:99,fontSize:9,fontWeight:900,padding:"3px 10px",marginTop:4,display:"inline-block",animation:"pulse 1.5s infinite"}}>● LIVE</div>:<div style={{color:C.g,fontSize:11,fontWeight:700,marginTop:4}}>✅ Done</div>}
            </div>
          </div>
          <div style={{padding:"18px"}}>
            {ORDER_STEPS.map((step,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:i<4?14:0}}>

                {i<order.statusIdx?<span style={{fontSize:11,color:C.g,fontWeight:900}}>✓</span>:i===order.statusIdx?<span style={{fontSize:15,animation:"pulse 1.5s infinite"}}>{step.icon}</span>:<span style={{color:C.m,fontSize:10,fontWeight:800}}>{i+1}</span>}
              </div>
              <div style={{flex:1,paddingTop:3}}>
                <div style={{fontSize:12,fontWeight:i===order.statusIdx?800:500,color:i<=order.statusIdx?C.w:C.m,...N,display:"flex",alignItems:"center",gap:8}}>
                  {step.label}{i===order.statusIdx&&<span style={{background:"rgba(74,222,128,.15)",color:C.g,fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:99}}>NOW</span>}

                {i===order.statusIdx&&<div style={{fontSize:11,color:C.m,marginTop:3,lineHeight:1.5}}>{step.msg}</div>}
              </div>
            </div>)}
            <div style={{display:"flex",flexWrap:"wrap",gap:6,paddingTop:12,marginTop:4,borderTop:`1px solid ${C.b}`}}>
              {order.items.map(i=><span key={i.id} style={{background:C.surf,color:C.m,padding:"3px 10px",borderRadius:99,fontSize:11}}>{i.emoji} {i.name} ×{i.qty}</span>)}
            </div>
          </div>

        <div>
          <div style={{...N,color:C.w,fontSize:26,fontWeight:900}}>Notifications 🔔</div>

      </div>
      {notifs.length===0?<div style={{textAlign:"center",padding:"60px 24px"}}>
        <div style={{fontSize:72}}>🔔</div>
        <div style={{...N,color:C.w,fontSize:20,fontWeight:900,marginTop:16}}>No notifications yet</div>
        <div style={{color:C.m,fontSize:13,marginTop:8}}>Order food to get live updates!</div>
      </div>:<div style={{padding:"0 22px"}}>
        {notifs.map((n,i)=><div key={n.id} onClick={()=>setNotifs(p=>p.map(x=>x.id===n.id?{...x,read:true}:x))} style={{background:n.read?C.card:"rgba(74,222,128,.06)",borderRadius:18,padding:"16px",marginBottom:10,border:`1px solid ${n.read?C.b:"rgba(74,222,128,.25)"}`,display:"flex",gap:12,cursor:"pointer",animation:`cIn .3s ease ${i*.05}s both`}}>
          <div style={{width:44,height:44,background:n.read?"rgba(74,222,128,.07)":"rgba(74,222,128,.14)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{n.icon}</div>
          <div style={{flex:1}}>
            <div style={{...N,fontWeight:800,color:C.w,fontSize:13}}>{n.label}</div>

            <div style={{fontSize:10,color:C.m2,marginTop:6}}>{n.time}</div>

        </div>)}
      </div>}
    </div>}

    {/* ══ PROFILE ═════════════════════════════════════════════════ */}
    {tab==="profile"&&<div style={{paddingBottom:90,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"52px 22px 28px",background:"linear-gradient(180deg,#0c1610 0%,transparent 100%)",textAlign:"center"}}>
        <div style={{position:"relative",display:"inline-block"}}>
          <div style={{width:88,height:88,background:C.gG,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,margin:"0 auto",boxShadow:"0 0 36px rgba(74,222,128,.32)",cursor:"pointer"}} onClick={()=>setModal({type:"avatar"})}>{user?.avatar||"😊"}</div>
          <div style={{position:"absolute",bottom:0,right:0,background:C.gG,borderRadius:"50%",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,cursor:"pointer",border:`2px solid ${C.bg}`}} onClick={()=>setModal({type:"avatar"})}>✏️</div>

        <div style={{...N,color:C.w,fontSize:22,fontWeight:900,marginTop:12}}>{user?.name}</div>

        <div style={{background:C.card,borderRadius:20,padding:16,border:`1px solid ${C.b}`,marginBottom:14}}>

            {ic:"🚪",l:"Sign Out",fn:handleSignOut,col:C.r,bg:"rgba(248,113,113,.1)",bd:"rgba(248,113,113,.25)"},
          ].map(b=><button key={b.l} onClick={b.fn} style={{background:b.bg,border:`1px solid ${b.bd}`,color:b.col,padding:"14px 16px",borderRadius:16,fontWeight:700,fontSize:14,textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:20}}>{b.ic}</span><span>{b.l}</span>
          </button>)}
        </div>
        <div style={{textAlign:"center",color:"#1b2d1f",fontSize:11,paddingBottom:8,lineHeight:1.8}}>Cosfit v6.0 · {COMPANY.name}</div>
      </div>
    </div>}

    {tab==="admin"&&isAdmin&&<div style={{paddingBottom:90,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"52px 22px 16px",background:"linear-gradient(135deg,#080f1c,#0c1610)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{color:C.blue,fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>⚙️ Admin Panel</div>
            <div style={{...N,color:C.w,fontSize:22,fontWeight:900,marginTop:4}}>Control Centre</div>
            <div style={{color:C.m,fontSize:12,marginTop:2}}>{adminUser?.name} · {adminUser?.role}</div>

            {ic} {k.charAt(0).toUpperCase()+k.slice(1)}
          </button>)}
        </div>
      </div>

      {adminTab==="orders"&&<div style={{padding:"0 22px"}}>
        <div style={{background:"rgba(96,165,250,.08)",border:"1px solid rgba(96,165,250,.2)",borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:12,color:C.blue,lineHeight:1.6}}>
          💡 Tap <b>"View Details"</b> to see full customer info. Tap <b>"Update →"</b> to advance order status.
        </div>
        {orders.length===0?<div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:52}}>📦</div><div style={{color:C.m,fontWeight:700,marginTop:12,...N}}>No orders yet</div></div>:
        orders.map(order=><div key={order.id} style={{background:C.card,borderRadius:20,marginBottom:14,border:`1px solid ${order.statusIdx<4?"rgba(74,222,128,.3)":C.b}`,overflow:"hidden"}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{...N,color:C.w,fontWeight:800,fontSize:13}}>#{String(order.id).slice(-8)}</div>
                <div style={{fontSize:11,color:C.m,marginTop:2}}>{order.date} · {order.time}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{...N,color:C.o,fontWeight:900,fontSize:16}}>₹{order.total}</div>
                <div style={{fontSize:10,color:C.m}}>{order.paymentStatus}</div>
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"10px 12px"}}>
              <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                <div style={{fontSize:12,color:C.m}}>👤 <span style={{color:C.w,fontWeight:700}}>{order.userName}</span></div>
                <div style={{fontSize:12,color:C.m}}>📞 <span style={{color:C.g,fontWeight:700}}>+91 {order.userPhone}</span></div>
                <div style={{fontSize:12,color:C.m}}>@<span style={{color:C.pur}}>{order.userUsername||"—"}</span></div>
              </div>
              <div style={{fontSize:11,color:C.m,marginTop:6}}>📍 {order.userAddress||"No address"}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:3,padding:"10px 16px 0"}}>
            {ORDER_STEPS.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:99,background:i<=order.statusIdx?C.g:C.b,transition:"background .5s"}}/>)}

          <div style={{padding:"10px 16px 14px"}}>
            <div style={{color:C.g,fontSize:11,fontWeight:700,marginBottom:8}}>{ORDER_STEPS[order.statusIdx]?.icon} {ORDER_STEPS[order.statusIdx]?.label}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
              {order.items.map(i=><span key={i.id} style={{background:C.surf,color:C.m,padding:"3px 10px",borderRadius:99,fontSize:11}}>{i.emoji} {i.name} ×{i.qty}</span>)}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal({type:"orderDetail",o:order})} style={{flex:1,background:"rgba(96,165,250,.1)",border:"1px solid rgba(96,165,250,.3)",color:C.blue,padding:"10px",borderRadius:12,fontWeight:700,fontSize:12,...F}}>View Details</button>
              {order.statusIdx<4?
                <button onClick={()=>updateOrder(order.id)} style={{flex:2,background:C.gG,color:"#060c08",border:"none",padding:"10px",borderRadius:12,fontWeight:900,fontSize:12,...N}}>

                <div style={{flex:2,background:"rgba(74,222,128,.07)",border:"1px solid rgba(74,222,128,.2)",borderRadius:12,padding:"10px",textAlign:"center",color:C.g,fontSize:12,fontWeight:700,...N}}>✅ Delivered!</div>
              }
            </div>
          </div>
        </div>)}
      </div>}
