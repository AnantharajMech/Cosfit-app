const tdee=(w,h,a,g,goal)=>{
  const bmr=g==="f"?10*w+6.25*h-5*a-161:10*w+6.25*h-5*a+5;
  return Math.round(bmr*1.55)+((GOALS.find(x=>x.id===goal))||{calMod:0}).calMod;
};

const getGreeting=(name,goal,orders)=>{
  const hr=new Date().getHours();
  const fn=name?.split(" ")[0]||"there";
  let greeting,icon,meal,tip,sticker;
  if(hr>=5&&hr<12){greeting="Good Morning";icon="☀️";meal="breakfast";sticker="🌅";tip=goal==="weight_loss"?"Start light – detox smoothie awaits!":goal==="muscle_gain"?"Fuel up! High-protein breakfast 💪":"Healthy breakfast to start your day!";}
  else if(hr>=12&&hr<17){greeting="Good Afternoon";icon="🌤";meal="lunch";sticker="🌞";tip=goal==="weight_loss"?"Stay on track – choose low-cal lunch!":goal==="muscle_gain"?"Lunch = muscle building time 💪":"Keep energy going – lunch time!";}
  else if(hr>=17&&hr<21){greeting="Good Evening";icon="🌆";meal="dinner";sticker="🌇";tip=goal==="weight_loss"?"Light dinner = better sleep!":goal==="muscle_gain"?"Recovery dinner – protein is key!":"Wind down with nutritious dinner!";}
  else{greeting="Good Night";icon="🌙";meal="dinner";sticker="🌃";tip="Light meal recommended for better sleep 😴";}
  const loyalty=orders.length>=10?"🏆 Top customer!":orders.length>=5?"⭐ Loyal member!":orders.length>=2?"✨ Regular customer!":"";
  return{greeting,icon,meal,tip,sticker,loyalty,fn};
};

      syncFoods(nf);return nf;
    });
    pop("✅ Saved to Firebase!");setModal(null);
  };
  const deleteFood=(gId,meal,id,name)=>{
    setFoods(prev=>{const nf={...prev,[gId]:{...prev[gId],[meal]:prev[gId][meal].filter(x=>x.id!==id)}};syncFoods(nf);return nf;});

  // ── ✅ FIREBASE AUTH HANDLERS ────────────────────────────────────

  // REGISTER — Firebase Auth + Firestore
  const handleRegister=async()=>{
    setAuthErr("");
    if(!rName||!rUsername||!rEmail||!rPhone||!rPassword) return setAuthErr("All fields are required");
    if(rPassword!==rConfirm) return setAuthErr("Passwords do not match");
    if(rPassword.length<6) return setAuthErr("Password must be at least 6 characters");
    if(!rEmail.includes("@")) return setAuthErr("Enter a valid email address");
    if(rPhone.length<10) return setAuthErr("Enter a valid 10-digit phone number");
    setLoading(true);
    try{
      // Check username unique
      const uCheck=await window.fbDB.collection("users").where("username","==",rUsername.toLowerCase().trim()).get();
      if(!uCheck.empty){setAuthErr("Username already taken. Try another.");setLoading(false);return;}
      // Create Firebase Auth account
      const cred=await window.fbAuth.createUserWithEmailAndPassword(rEmail.trim(),rPassword);
      const uid=cred.user.uid;
      // Save user profile to Firestore
      const userData={
        uid,name:rName.trim(),username:rUsername.toLowerCase().trim(),
        email:rEmail.toLowerCase().trim(),phone:rPhone,
        avatar:"😊",plan:null,address:"",
        goal:"general",pref:"all",age:"25",weight:"70",height:"175",gender:"m",
        joinedAt:new Date().toISOString()
      };
      await window.fbDB.collection("users").doc(uid).set(userData);
      setUser(userData);
      setScr("onboard");
      pop("Account created! 🎉");
    }catch(e){
      if(e.code==="auth/email-already-in-use") setAuthErr("This email is already registered. Please login.");
      else setAuthErr(e.message||"Registration failed. Try again.");
    }
    setLoading(false);
  };

  // LOGIN — Firebase Auth + username lookup
  const handleLogin=async()=>{
    setAuthErr("");
    if(!loginId||!loginPassword) return setAuthErr("Enter username/email and password");
    setLoading(true);
    try{
      let email=loginId.trim();
      // Username login — look up email from Firestore
      if(!loginId.includes("@")){
        const q=await window.fbDB.collection("users").where("username","==",loginId.toLowerCase().trim()).get();
        if(q.empty){setAuthErr("Username not found.");setLoading(false);return;}
        email=q.docs[0].data().email;
      }
      await window.fbAuth.signInWithEmailAndPassword(email,loginPassword);
      // onAuthStateChanged will handle the rest
      pop("Welcome back! 👋");
    }catch(e){
      if(e.code==="auth/wrong-password"||e.code==="auth/user-not-found"||e.code==="auth/invalid-credential")
        setAuthErr("Wrong email or password. Try again.");
      else setAuthErr(e.message||"Login failed.");
    }
    setLoading(false);
  };

      pop("✅ Password reset email sent! Check your inbox.");

      setFEmail("");

          <div style={{...N,color:C.w,fontWeight:800,fontSize:15,marginBottom:14}}>Bill Summary</div>
          {[["Subtotal",`₹${cartSub}`],["Delivery",delivery===0?"🎁 Free":`₹${delivery}`],[`GST (${settings.gst}%)`,`₹${gstAmt}`],["Platform Fee",`₹${settings.platformFee}`]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:13}}>
            <span style={{color:C.m}}>{l}</span><span style={{color:C.w,fontWeight:600}}>{v}</span>
          </div>)}
          <div style={{borderTop:`1px solid ${C.b}`,paddingTop:12,marginTop:4,display:"flex",justifyContent:"space-between"}}>
            <span style={{...N,color:C.w,fontWeight:900,fontSize:17}}>Total</span>
            <span style={{...N,color:C.o,fontWeight:900,fontSize:20}}>₹{orderTotal}</span>
          </div>
        </div>
        <div style={{background:C.card,borderRadius:18,padding:18,marginBottom:16,border:`1px solid ${C.b}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{...N,fontWeight:800,color:C.w,fontSize:14}}>📍 Delivery Address</div>
            <button onClick={()=>setTab("profile")} style={{background:"none",border:"none",color:C.g,fontSize:12,fontWeight:700,...N}}>Edit →</button>
          </div>
          {user?.address?<div style={{color:C.m,fontSize:13,lineHeight:1.6}}>{user.address}</div>:
          <button onClick={()=>setTab("profile")} style={{width:"100%",background:"rgba(74,222,128,.07)",border:"1px dashed rgba(74,222,128,.3)",color:C.g,padding:"12px",borderRadius:12,fontWeight:700,fontSize:13}}>+ Add Delivery Address</button>}
        </div>
        <button onClick={placeOrder} style={{width:"100%",background:C.gO,color:"#fff",border:"none",padding:18,borderRadius:18,fontWeight:900,fontSize:16,...N,boxShadow:"0 8px 36px rgba(249,115,22,.42)"}}>🚀 Place Order</button>
      </div>}
    </div>}

    {/* ══ TRACK ══ */}
    {tab==="track"&&<div style={{paddingBottom:90,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"52px 22px 22px"}}>
        <div style={{...N,color:C.w,fontSize:26,fontWeight:900}}>Track Orders 🛵</div>
        <div style={{color:C.m,fontSize:13,marginTop:4}}>{orders.length} total · {liveOrders} live</div>
      </div>
      {orders.length===0?<div style={{textAlign:"center",padding:"60px 24px"}}>
        <div style={{fontSize:72}}>📦</div>
        <div style={{...N,color:C.w,fontSize:20,fontWeight:900,marginTop:16}}>No orders yet</div>
        <button onClick={()=>setTab("menu")} style={{background:C.gG,color:"#060c08",border:"none",padding:"14px 32px",borderRadius:16,fontWeight:800,fontSize:14,marginTop:24,...N}}>Order Now →</button>
      </div>:<div style={{padding:"0 22px"}}>
        {orders.map(order=><div key={order.id} style={{background:C.card,borderRadius:22,marginBottom:16,border:`1px solid ${order.statusIdx<4?"rgba(74,222,128,.35)":C.b}`,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(135deg,#0c1610,#101a13)",padding:"16px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{...N,color:C.w,fontWeight:800,fontSize:14}}>#{String(order.id).slice(-8)}</div>
              <div style={{color:C.m,fontSize:11,marginTop:2}}>{order.date} · {order.time}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{...N,color:C.o,fontWeight:900,fontSize:18}}>₹{order.total}</div>
              {order.statusIdx<4?<div style={{background:"rgba(74,222,128,.15)",color:C.g,borderRadius:99,fontSize:9,fontWeight:900,padding:"3px 10px",marginTop:4,display:"inline-block",animation:"pulse 1.5s infinite"}}>● LIVE</div>:<div style={{color:C.g,fontSize:11,fontWeight:700,marginTop:4}}>✅ Done</div>}
            </div>
          </div>
          <div style={{padding:"18px"}}>
            {ORDER_STEPS.map((step,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:i<4?14:0}}>
              <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,background:i<order.statusIdx?"rgba(74,222,128,.18)":i===order.statusIdx?"rgba(74,222,128,.12)":"transparent",border:`2px solid ${i<=order.statusIdx?C.g:C.b}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .5s"}}>
                {i<order.statusIdx?<span style={{fontSize:11,color:C.g,fontWeight:900}}>✓</span>:i===order.statusIdx?<span style={{fontSize:15,animation:"pulse 1.5s infinite"}}>{step.icon}</span>:<span style={{color:C.m,fontSize:10,fontWeight:800}}>{i+1}</span>}
              </div>
              <div style={{flex:1,paddingTop:3}}>
                <div style={{fontSize:12,fontWeight:i===order.statusIdx?800:500,color:i<=order.statusIdx?C.w:C.m,...N,display:"flex",alignItems:"center",gap:8}}>
                  {step.label}{i===order.statusIdx&&<span style={{background:"rgba(74,222,128,.15)",color:C.g,fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:99}}>NOW</span>}
                </div>
                {i===order.statusIdx&&<div style={{fontSize:11,color:C.m,marginTop:3,lineHeight:1.5}}>{step.msg}</div>}
              </div>
            </div>)}
            <div style={{display:"flex",flexWrap:"wrap",gap:6,paddingTop:12,marginTop:4,borderTop:`1px solid ${C.b}`}}>
              {order.items.map(i=><span key={i.id} style={{background:C.surf,color:C.m,padding:"3px 10px",borderRadius:99,fontSize:11}}>{i.emoji} {i.name} ×{i.qty}</span>)}
            </div>
          </div>
        </div>)}
      </div>}
    </div>}

    {/* ══ NOTIFS ══ */}
    {tab==="notifs"&&<div style={{paddingBottom:90,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"52px 22px 20px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{...N,color:C.w,fontSize:26,fontWeight:900}}>Notifications 🔔</div>
          <div style={{color:C.m,fontSize:13,marginTop:4}}>{unread} unread</div>
        </div>
        {unread>0&&<button onClick={()=>setNotifs(p=>p.map(n=>({...n,read:true})))} style={{background:"none",border:"none",color:C.g,fontSize:12,fontWeight:700,...N}}>Mark all read</button>}
      </div>
      {notifs.length===0?<div style={{textAlign:"center",padding:"60px 24px"}}>
        <div style={{fontSize:72}}>🔔</div>
        <div style={{...N,color:C.w,fontSize:20,fontWeight:900,marginTop:16}}>No notifications yet</div>
      </div>:<div style={{padding:"0 22px"}}>
        {notifs.map((n,i)=><div key={n.id} onClick={()=>setNotifs(p=>p.map(x=>x.id===n.id?{...x,read:true}:x))} style={{background:n.read?C.card:"rgba(74,222,128,.06)",borderRadius:18,padding:"16px",marginBottom:10,border:`1px solid ${n.read?C.b:"rgba(74,222,128,.25)"}`,display:"flex",gap:12,cursor:"pointer",animation:`cIn .3s ease ${i*.05}s both`}}>
          <div style={{width:44,height:44,background:n.read?"rgba(74,222,128,.07)":"rgba(74,222,128,.14)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{n.icon}</div>
          <div style={{flex:1}}>
            <div style={{...N,fontWeight:800,color:C.w,fontSize:13}}>{n.label}</div>
            <div style={{fontSize:12,color:C.m,marginTop:3,lineHeight:1.5}}>{n.msg}</div>
            <div style={{fontSize:10,color:C.m2,marginTop:6}}>{n.time}</div>
          </div>
          {!n.read&&<div style={{width:9,height:9,borderRadius:"50%",background:C.g,flexShrink:0,marginTop:5,animation:"pulse 1.5s infinite"}}/>}
        </div>)}
      </div>}
    </div>}

    {/* ══ PROFILE ══ */}
    {tab==="profile"&&<div style={{paddingBottom:90,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"52px 22px 28px",background:"linear-gradient(180deg,#0c1610 0%,transparent 100%)",textAlign:"center"}}>
        <div style={{position:"relative",display:"inline-block"}}>
          <div style={{width:88,height:88,background:C.gG,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,margin:"0 auto",boxShadow:"0 0 36px rgba(74,222,128,.32)",cursor:"pointer"}} onClick={()=>setModal({type:"avatar"})}>{user?.avatar||"😊"}</div>
          <div style={{position:"absolute",bottom:0,right:0,background:C.gG,borderRadius:"50%",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,cursor:"pointer",border:`2px solid ${C.bg}`}} onClick={()=>setModal({type:"avatar"})}>✏️</div>
        </div>
        <div style={{...N,color:C.w,fontSize:22,fontWeight:900,marginTop:12}}>{user?.name}</div>
        <div style={{color:C.m,fontSize:13,marginTop:4}}>@{user?.username} · +91 {user?.phone}</div>
        <div style={{color:C.m,fontSize:12,marginTop:3}}>{user?.email}</div>
        {curPlan&&<div style={{display:"inline-flex",gap:6,background:"rgba(251,191,36,.1)",border:"1px solid rgba(251,191,36,.3)",borderRadius:20,padding:"6px 14px",marginTop:10}}>
          <span style={{color:C.gold,fontSize:12,fontWeight:800,...N}}>⚡ {curPlan.label} Pro</span>
        </div>}
      </div>
      <div style={{padding:"0 22px"}}>
        <div style={{background:C.card,borderRadius:20,padding:16,border:`1px solid ${C.b}`,marginBottom:14}}>
          <div style={{...N,color:C.w,fontWeight:800,fontSize:14,marginBottom:12}}>📍 Delivery Address</div>
          <Field value={user?.address||""} onChange={v=>setUser(p=>({...p,address:v}))} ph="Enter your full delivery address..." rows={3}/>
          <button onClick={saveProfile} style={{width:"100%",marginTop:10,background:C.gG,color:"#060c08",border:"none",padding:13,borderRadius:12,fontWeight:800,fontSize:14,...N}}>Save Address</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
          {[
            {ic:"🖼",l:"Change Avatar",fn:()=>setModal({type:"avatar"}),col:C.g,bg:"rgba(74,222,128,.08)",bd:"rgba(74,222,128,.25)"},
            {ic:"⚡",l:curPlan?`Active: ${curPlan.label} Pro`:"Upgrade to Pro",fn:()=>setModal({type:"sub"}),col:C.gold,bg:"rgba(251,191,36,.08)",bd:"rgba(251,191,36,.25)"},
            {ic:"⚙️",l:isAdmin?"Admin Panel →":"Admin Login",fn:()=>isAdmin?setTab("admin"):setModal({type:"adminLogin"}),col:isAdmin?C.g:C.m,bg:C.card,bd:C.b},
            {ic:"🚪",l:"Sign Out",fn:handleSignOut,col:C.r,bg:"rgba(248,113,113,.1)",bd:"rgba(248,113,113,.25)"},
          ].map(b=><button key={b.l} onClick={b.fn} style={{background:b.bg,border:`1px solid ${b.bd}`,color:b.col,padding:"14px 16px",borderRadius:16,fontWeight:700,fontSize:14,textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:20}}>{b.ic}</span><span>{b.l}</span>
          </button>)}
        </div>
        <div style={{background:"rgba(74,222,128,.05)",border:"1px solid rgba(74,222,128,.1)",borderRadius:14,padding:"12px 16px",marginBottom:14}}>
          <div style={{color:C.g,fontSize:11,fontWeight:700,...N,marginBottom:4}}>🔐 Firebase Auth Active</div>
          <div style={{color:C.m,fontSize:11}}>Your account is securely stored in Firebase. Password reset works via Gmail link.</div>
        </div>
        <div style={{textAlign:"center",color:"#1b2d1f",fontSize:11,paddingBottom:8,lineHeight:1.8}}>Cosfit v6.0 · {COMPANY.name}</div>
      </div>
    </div>}

    {/* ══ ADMIN PANEL ══ */}
    {tab==="admin"&&isAdmin&&<div style={{paddingBottom:90,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"52px 22px 16px",background:"linear-gradient(135deg,#080f1c,#0c1610)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{color:C.blue,fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>⚙️ Admin Panel</div>
            <div style={{...N,color:C.w,fontSize:22,fontWeight:900,marginTop:4}}>Control Centre</div>
            <div style={{color:C.m,fontSize:12,marginTop:2}}>{adminUser?.name} · {adminUser?.role}</div>
          </div>
          <button onClick={()=>{setIsAdmin(false);setAdminUser(null);setTab("profile");pop("Exited admin");}} style={{background:"rgba(248,113,113,.15)",border:"1px solid rgba(248,113,113,.3)",color:C.r,padding:"8px 14px",borderRadius:20,fontSize:12,fontWeight:700,...N}}>Exit</button>
        </div>
        <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
          {[[`${orders.length} Orders`,C.g],[`${allOrders.length} Total`,C.o],[`${allUsers.length} Users`,C.pur],[`${allFlat.filter(i=>i.active).length} Items`,C.blue]].map(([l,c])=><div key={l} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:99,padding:"4px 12px",fontSize:10,fontWeight:700,color:c}}>{l}</div>)}
        </div>
      </div>

      <div style={{padding:"0 22px 14px"}}>
        <div style={{display:"flex",background:C.card,borderRadius:14,padding:4,gap:2,overflowX:"auto"}}>
          {[["orders","📦"],["foods","🍽"],["customers","👥"],["stats","📊"]].map(([k,ic])=><button key={k} onClick={()=>setAdminTab(k)} style={{flexShrink:0,padding:"9px 14px",borderRadius:10,border:"none",background:adminTab===k?C.blue:"transparent",color:adminTab===k?"#fff":C.m,fontWeight:700,fontSize:12,...F,whiteSpace:"nowrap"}}>
            {ic} {k.charAt(0).toUpperCase()+k.slice(1)}
          </button>)}
        </div>
      </div>

      {adminTab==="orders"&&<div style={{padding:"0 22px"}}>
        {[...orders,...allOrders.filter(o=>!orders.find(x=>x.id===o.id))].length===0?
        <div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:52}}>📦</div><div style={{color:C.m,fontWeight:700,marginTop:12,...N}}>No orders yet</div></div>:
        [...orders,...allOrders.filter(o=>!orders.find(x=>x.id===o.id))].map(order=><div key={order.id} style={{background:C.card,borderRadius:20,marginBottom:14,border:`1px solid ${order.statusIdx<4?"rgba(74,222,128,.3)":C.b}`,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(135deg,#080f1c,#0c1610)",padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{...N,color:C.w,fontWeight:800,fontSize:13}}>#{String(order.id).slice(-8)}</div>
                <div style={{fontSize:11,color:C.m,marginTop:2}}>{order.date} · {order.time}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{...N,color:C.o,fontWeight:900,fontSize:16}}>₹{order.total}</div>
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"10px 12px"}}>
              <div style={{fontSize:12,color:C.m}}>👤 <span style={{color:C.w,fontWeight:700}}>{order.userName}</span></div>
              <div style={{fontSize:12,color:C.m,marginTop:4}}>📞 <span style={{color:C.g,fontWeight:700}}>+91 {order.userPhone}</span></div>
              <div style={{fontSize:11,color:C.m,marginTop:4}}>📍 {order.userAddress||"No address"}</div>
            </div>
          </div>
          <div style={{padding:"10px 16px 14px"}}>
            <div style={{color:C.g,fontSize:11,fontWeight:700,marginBottom:8}}>{ORDER_STEPS[order.statusIdx]?.icon} {ORDER_STEPS[order.statusIdx]?.label}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
              {order.items.map(i=><span key={i.id} style={{background:C.surf,color:C.m,padding:"3px 10px",borderRadius:99,fontSize:11}}>{i.emoji} {i.name} ×{i.qty}</span>)}
            </div>
            {order.statusIdx<4?
              <button onClick={()=>updateOrder(order.id)} style={{width:"100%",background:C.gG,color:"#060c08",border:"none",padding:"10px",borderRadius:12,fontWeight:900,fontSize:12,...N}}>
                Update → {ORDER_STEPS[order.statusIdx+1]?.icon} {ORDER_STEPS[order.statusIdx+1]?.label}
              </button>:
              <div style={{background:"rgba(74,222,128,.07)",border:"1px solid rgba(74,222,128,.2)",borderRadius:12,padding:"10px",textAlign:"center",color:C.g,fontSize:12,fontWeight:700,...N}}>✅ Delivered!</div>
            }
          </div>
        </div>)}
      </div>}

      {adminTab==="foods"&&<div style={{padding:"0 22px"}}>
        {GOALS.map(goal=><div key={goal.id} style={{marginBottom:22}}>
          <div style={{...N,color:C.w,fontWeight:900,fontSize:14,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
            <span>{goal.icon}</span><span>{goal.label}</span>
            <span style={{color:C.m,fontSize:11,fontWeight:600,marginLeft:"auto"}}>{Object.values(foods[goal.id]||{}).flat().length} items</span>
          </div>
          {MEALS.map(meal=><div key={meal} style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:C.m,textTransform:"uppercase",letterSpacing:1.2,marginBottom:8}}>{MIC[meal]} {meal} ({(foods[goal.id]?.[meal]||[]).length})</div>
            {(foods[goal.id]?.[meal]||[]).map(item=><div key={item.id} style={{background:C.card,borderRadius:13,padding:"10px 12px",marginBottom:7,border:`1px solid ${C.b}`,display:"flex",alignItems:"center",gap:9,opacity:!item.active?0.45:1}}>
              <span style={{fontSize:20,flexShrink:0}}>{item.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{...N,fontWeight:700,color:C.w,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                <div style={{fontSize:10,color:C.m}}>₹{item.price} · {item.cal}kcal</div>
              </div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                <button onClick={()=>toggleProp(goal.id,meal,item.id,"stock")} style={{background:item.stock?"rgba(74,222,128,.12)":"rgba(248,113,113,.12)",border:"none",color:item.stock?C.g:C.r,width:28,height:28,borderRadius:8,fontSize:12}}>{item.stock?"📦":"🚫"}</button>
                <button onClick={()=>toggleProp(goal.id,meal,item.id,"active")} style={{background:item.active?"rgba(74,222,128,.12)":"rgba(100,100,100,.1)",border:"none",color:item.active?C.g:C.m,width:28,height:28,borderRadius:8,fontSize:13}}>{item.active?"👁":"🙈"}</button>
                <button onClick={()=>deleteFood(goal.id,meal,item.id,item.name)} style={{background:"rgba(248,113,113,.12)",border:"none",color:C.r,width:28,height:28,borderRadius:8,fontSize:12}}>🗑</button>
              </div>
            </div>)}
          </div>)}
        </div>)}
      </div>}

      {adminTab==="customers"&&<div style={{padding:"0 22px"}}>
        <div style={{...N,color:C.w,fontWeight:800,fontSize:15,marginBottom:14}}>👥 Firebase Users ({allUsers.length})</div>
        {allUsers.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.m}}>No customers yet. Users registered via Firebase Auth appear here.</div>:
        allUsers.map(u=><div key={u.uid||u.email} style={{background:C.card,borderRadius:18,padding:"16px",marginBottom:12,border:`1px solid ${C.b}`}}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:46,height:46,background:C.gG,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{u.avatar||"😊"}</div>
            <div style={{flex:1}}>
              <div style={{...N,color:C.w,fontWeight:800,fontSize:14}}>{u.name}</div>
              <div style={{color:C.m,fontSize:12,marginTop:2}}>@{u.username} · +91 {u.phone}</div>
              <div style={{color:C.m,fontSize:11,marginTop:2}}>{u.email}</div>
              {u.address&&<div style={{color:C.m,fontSize:11,marginTop:4}}>📍 {u.address}</div>}
            </div>
          </div>
        </div>)}
      </div>}

      {adminTab==="stats"&&<div style={{padding:"0 22px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
          {[["📦","Orders",orders.length,C.g],["💰","Revenue","₹"+orders.reduce((s,o)=>s+o.total,0),C.o],["👥","Firebase Users",allUsers.length,C.pur],["🍽","Menu Items",allFlat.length,C.blue]].map(([ic,l,v,col])=><div key={l} style={{background:C.card,borderRadius:18,padding:"16px",border:`1px solid ${C.b}`}}>
            <div style={{fontSize:22}}>{ic}</div>
            <div style={{...N,color:col,fontSize:24,fontWeight:900,marginTop:6}}>{v}</div>
            <div style={{color:C.m,fontSize:11,marginTop:3}}>{l}</div>
          </div>)}
        </div>
        <div style={{background:"rgba(74,222,128,.07)",border:"1px solid rgba(74,222,128,.2)",borderRadius:16,padding:"16px"}}>
          <div style={{color:C.g,fontWeight:800,fontSize:13,...N,marginBottom:8}}>🔥 Firebase Status</div>
          <div style={{color:C.m,fontSize:12,lineHeight:1.8}}>
            ✅ Firebase Auth — Active<br/>
            ✅ Firestore — Connected<br/>
            ✅ Food Menu — Synced<br/>
            ✅ Real Gmail OTP — Via Firebase Reset Link<br/>
            ✅ Orders — Saved to Firestore
          </div>
        </div>
      </div>}
    </div>}

    {/* ══ BOTTOM NAV ══ */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(6,12,8,.97)",backdropFilter:"blur(24px)",borderTop:`1px solid ${C.b}`,display:"flex",padding:"10px 0 24px",zIndex:200}}>
      {NavBtn("home","🏠","Home",0)}
      {NavBtn("menu","🍽","Menu",0)}
      {NavBtn("cart","🛒","Cart",cartCount)}
      {NavBtn("track","🛵","Track",liveOrders)}
      {NavBtn("notifs","🔔","Alerts",unread)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
