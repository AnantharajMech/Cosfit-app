<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cosfit — Eat Smart Live Strong</title>
    <meta name="theme-color" content="#4ade80" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* ── CSS STYLING ── */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { background: #060c08; color: #edf8f0; width: 100%; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        #root { width: 100%; max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }
        ::-webkit-scrollbar { display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes up { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes toast { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        input, textarea { width: 100%; background: #101a13; border: 1px solid #1b2d1f; border-radius: 14px; padding: 16px; color: white; font-size: 15px; outline: none; }
        input:focus { border-color: #4ade80; }

        .primary-btn { background: linear-gradient(135deg, #4ade80, #22c55e); color: #000; padding: 18px; border-radius: 16px; font-weight: 900; width: 100%; text-align: center; border: none; box-shadow: 0 8px 24px rgba(74, 222, 128, 0.2); }
        .primary-btn:active { transform: scale(0.96); }

        .shimmer { background: linear-gradient(90deg, #101a13 25%, #1b2d1f 50%, #101a13 75%); background-size: 200% 100%; animation: shimmer-ani 1.5s infinite; }
        @keyframes shimmer-ani { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const C = { bg: "#060c08", surf: "#0c1610", card: "#101a13", b: "#1b2d1f", g: "#4ade80", gG: "linear-gradient(135deg, #4ade80, #22c55e)", o: "#fb923c", r: "#f87171", m: "#5e7d68" };
    const GOALS = [{ id: "weight_loss", label: "Weight Loss", icon: "⚖️", calMod: -500 }, { id: "muscle_gain", label: "Muscle Gain", icon: "💪", calMod: 300 }, { id: "general", label: "Stay Fit", icon: "🌿", calMod: 0 }];
    const MEALS = ["breakfast", "lunch", "dinner"];
    const MIC = { breakfast: "☀️", lunch: "🌤", dinner: "🌙" };
    const AVATARS = ["😊", "💪", "🥗", "🔥", "⚡", "👑", "🎯", "🧘"];
    
    const ORDER_STEPS = [
        { icon: "✅", label: "Confirmed", msg: "We got your order!" },
        { icon: "👨‍🍳", label: "Preparing", msg: "Chefs are cooking!" },
        { icon: "📦", label: "Packed", msg: "Ready for pickup." },
        { icon: "🛵", label: "Delivery", msg: "Rider is coming!" },
        { icon: "🎉", label: "Delivered", msg: "Enjoy your meal!" }
    ];

    const INIT_FOODS = {
        weight_loss: {
            breakfast: [{ id: 1, name: "Detox Smoothie", desc: "Spinach, apple, lemon", cal: 185, p: 5, c: 32, f: 3, price: 129, emoji: "🥤", tag: "Detox", active: true, stock: true }],
            lunch: [{ id: 5, name: "Grilled Chicken Salad", desc: "Lettuce, tomato, lemon", cal: 320, p: 34, c: 12, f: 11, price: 229, emoji: "🥗", tag: "Low Carb", active: true, stock: true }],
            dinner: [{ id: 8, name: "Steamed Fish", desc: "Tilapia, broccoli", cal: 310, p: 38, c: 10, f: 12, price: 259, emoji: "🐟", tag: "Healthy", active: true, stock: true }]
        },
        muscle_gain: {
            breakfast: [{ id: 11, name: "Power Bowl", desc: "4 eggs, oats", cal: 620, p: 42, c: 58, f: 18, price: 219, emoji: "💪", tag: "Fuel", active: true, stock: true }],
            lunch: [{ id: 14, name: "Quinoa Feast", desc: "Chicken, quinoa", cal: 680, p: 56, c: 55, f: 16, price: 329, emoji: "🍗", tag: "Muscle", active: true, stock: true }],
            dinner: [{ id: 17, name: "Steak & Mash", desc: "Lean beef, sweet mash", cal: 690, p: 54, c: 48, f: 22, price: 389, emoji: "🥩", tag: "Iron", active: true, stock: true }]
        },
        general: {
            breakfast: [{ id: 20, name: "Avocado Toast", desc: "Multigrain, seeds", cal: 310, p: 10, c: 34, f: 16, price: 179, emoji: "🥑", tag: "Fat", active: true, stock: true }],
            lunch: [{ id: 24, name: "Dal Tadka & Rice", desc: "Yellow dal, brown rice", cal: 440, p: 18, c: 72, f: 8, price: 159, emoji: "🍚", tag: "Classic", active: true, stock: true }],
            dinner: [{ id: 28, name: "Palak Paneer", desc: "Spinach, 2 rotis", cal: 390, p: 22, c: 44, f: 14, price: 189, emoji: "🥬", tag: "Iron", active: true, stock: true }]
        }
    }    function Toast({ t }) {
        return <div style={{ position: "fixed", top: 22, left: "50%", transform: "translateX(-50%)", background: t.err ? "#ef4444" : "#22c55e", color: "#fff", padding: "12px 24px", borderRadius: 50, fontWeight: 700, fontSize: 14, zIndex: 10000, animation: "toast 0.3s both" }}>{t.msg}</div>;
    }

    function Sheet({ onClose, children, tall }) {
        return (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", zIndex: 950, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
                <div style={{ background: "#0c1610", borderRadius: "32px 32px 0 0", width: "100%", maxWidth: 430, padding: "24px", maxHeight: tall ? "95vh" : "80vh", overflowY: "auto", animation: "up 0.4s" }} onClick={e => e.stopPropagation()}>
                    <div style={{ width: 40, height: 4, background: "#1b2d1f", borderRadius: 10, margin: "0 auto 20px" }} />
                    {children}
                </div>
            </div>
        );
    }

    function App() {
        const [scr, setScr] = useState("splash");
        const [authTab, setAuthTab] = useState("login");
        const [loading, setLoading] = useState(false);
        const [user, setUser] = useState(null);
        const [users, setUsers] = useState([]);
        const [isAdmin, setIsAdmin] = useState(false);
        
        // Input States
        const [loginMail, setLoginMail] = useState("");
        const [loginPass, setLoginPass] = useState("");
        const [regName, setRegName] = useState("");
        const [regMail, setRegMail] = useState("");
        const [regPhone, setRegPhone] = useState("");
        const [regPass, setRegPass] = useState("");
        const [fEmail, setFEmail] = useState("");
        const [authErr, setAuthErr] = useState("");

        // App Data
        const [foods, setFoods] = useState(INIT_FOODS);
        const [cart, setCart] = useState(() => {
            const s = localStorage.getItem("cosfit_cart");
            return s ? JSON.parse(s) : [];
        });
        const [orders, setOrders] = useState([]);
        const [notifs, setNotifs] = useState([]);
        const [toast, setToast] = useState(null);
        const [tab, setTab] = useState("home");
        const [mGoal, setMGoal] = useState("general");
        const [mMeal, setMMeal] = useState("breakfast");
        const [search, setSearch] = useState("");
        const [modal, setModal] = useState(null);

        // 3. Persistent Cart (Claude Fix)
        useEffect(() => { localStorage.setItem("cosfit_cart", JSON.stringify(cart)); }, [cart]);

        // 🔥 5. FIREBASE ID FIX (cosfit-af85d) 🔥
        useEffect(() => {
            const start = async () => {
                try {
                    if (!window.firebase.apps.length) {
                        window.firebase.initializeApp({
                            apiKey: "AIzaSyBaNFG34QfaciXeOVQWQtNGoMI65ozEVTA",
                            authDomain: "cosfit-af85d.firebaseapp.com",
                            projectId: "cosfit-af85d",
                            storageBucket: "cosfit-af85d.firebasestorage.app",
                            messagingSenderId: "58737921778",
                            appId: "1:58737921778:web:1dbd0913dfbbf05f494a6b"
                        });
                    }
                    const db = window.firebase.firestore();
                    window.fbDB = db;

                    // Realtime Listeners
                    db.collection("app_data").doc("foods_menu").onSnapshot(s => { if(s.exists) setFoods(s.data()); });
                    db.collection("app_data").doc("users_list").onSnapshot(s => { if(s.exists) setUsers(s.data().users || []); });
                    db.collection("app_data").doc("orders_list").onSnapshot(s => { if(s.exists) setOrders(s.data().orders || []); });

                    window.firebase.auth().onAuthStateChanged((u) => {
                        if (u) {
                            db.collection("app_data").doc("users_list").get().then(snap => {
                                const all = snap.exists ? snap.data().users : [];
                                const found = all.find(x => x.email === u.email);
                                if (found) {
                                    setUser(found);
                                    if (found.role === "admin") setIsAdmin(true);
                                    setScr("app");
                                }
                            });
                        } else { setScr("auth"); }
                    });
                } catch (e) { console.error(e); setScr("auth"); }
            };
            start();
        }, []);

        const pop = (msg, err = false) => { setToast({ msg, err }); setTimeout(() => setToast(null), 3000); };

        // 🔥 8. PHONE VALIDATION & 9. LOADING STATE 🔥
        const handleRegister = async () => {
            setAuthErr("");
            if (!regName || !regMail || regPhone.length !== 10 || regPass.length < 6) return setAuthErr("Check fields (10-digit phone, 6-char pass)");
            setLoading(true);
            try {
                const res = await window.firebase.auth().createUserWithEmailAndPassword(regMail.trim(), regPass);
                const nu = { id: res.user.uid, name: regName, email: regMail.toLowerCase(), phone: regPhone, avatar: "😊", role: "user", goal: "general", age: "25", weight: "70", height: "175", gender: "m" };
                const upUsers = [...users, nu];
                await window.fbDB.collection("app_data").doc("users_list").set({ users: upUsers }, { merge: true });
                setUser(nu); setScr("app"); pop("Account Created! 🎉");
            } catch (e) { setAuthErr(e.message); }
            setLoading(false);
        };

        const handleLogin = async () => {
            setAuthErr(""); if (!loginMail || !loginPass) return setAuthErr("Enter email/pass");
            setLoading(true);
            try {
                let mail = loginMail.trim().toLowerCase();
                if (!mail.includes("@")) {
                    const u = users.find(x => x.name.toLowerCase() === mail || x.phone === mail);
                    if (u) mail = u.email; else throw new Error("User not found");
                }
                await window.firebase.auth().signInWithEmailAndPassword(mail, loginPass);
                pop("Welcome back!");
            } catch (e) { setAuthErr("Login failed"); }
            setLoading(false);
        };

        const handleForgotPass = async () => {
            if (!fEmail.includes("@")) return pop("Enter valid Gmail", true);
            setLoading(true);
            try {
                await window.firebase.auth().sendPasswordResetEmail(fEmail.trim());
                pop("Reset link sent! Check Gmail ✅"); setAuthTab("login");
            } catch (e) { pop("Error sending link", true); }
            setLoading(false);
        };

        const signOut = () => window.firebase.auth().signOut().then(() => { setScr("auth"); setUser(null); setIsAdmin(false); setTab("home"); });
        const addToCart = (i) => {
            setCart(prev => {
                const ex = prev.find(c => c.id === i.id);
                return ex ? prev.map(c => c.id === i.id ? { ...c, qty: c.qty + 1 } : c) : [...prev, { ...i, qty: 1 }];
            });
            pop(i.emoji + " Added!");
        };

        const placeOrder = async () => {
            if (!cart.length) return;
            setLoading(true);
            const o = { id: Date.now(), userId: user.id, userName: user.name, items: [...cart], total: cart.reduce((s, i) => s + i.price * i.qty, 0) + 50, statusIdx: 0, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString() };
            try {
                await window.fbDB.collection("app_data").doc("orders_list").set({ orders: window.firebase.firestore.FieldValue.arrayUnion(o) }, { merge: true });
                setCart([]); setTab("track"); pop("Order Placed! 🚀");
            } catch (e) { pop("Failed", true); }
            setLoading(false);
        };

        if (scr === "splash") return <div className="flex-center" style={{ height: "100vh", flexDirection: "column" }}><div style={{ fontSize: 80, animation: "pop 0.6s both" }}>🥗</div><h1 style={{ marginTop: 20, fontSize: 40, fontWeight: 900 }}>Cosfit</h1></div>;

        if (scr === "auth") return (
            <div style={{ padding: "60px 25px" }}>
                {toast && <Toast t={toast} />}
                <div style={{ textAlign: "center", marginBottom: 40 }}><div style={{ fontSize: 60 }}>🥗</div><h2 style={{ marginTop: 15 }}>Welcome to Cosfit</h2></div>
                <div style={{ display: "flex", background: "#101a13", borderRadius: 18, padding: 5, marginBottom: 30 }}>
                    {["login", "register"].map(t => <button key={t} onClick={() => setAuthTab(t)} style={{ flex: 1, padding: 15, borderRadius: 14, background: authTab === t ? "#4ade80" : "transparent", color: authTab === t ? "#000" : "#5e7d68", fontWeight: 800 }}>{t === "login" ? "Sign In" : "Join"}</button>)}
                </div>
                {authErr && <div style={{ color: "#f87171", textAlign: "center", marginBottom: 20 }}>⚠️ {authErr}</div>}
                {authTab === "login" && <div>
                    <input value={loginMail} onChange={e => setLoginMail(e.target.value)} placeholder="Email or Phone" style={{ marginBottom: 15 }} />
                    <input type="password" value={loginPass} onChange={e => setLoginPass(e.target.value)} placeholder="Password" style={{ marginBottom: 15 }} />
                    <button onClick={() => setAuthTab("forgot")} style={{ float: "right", color: "#4ade80", background: "none", marginBottom: 20 }}>Forgot?</button>
                    <button disabled={loading} onClick={handleLogin} className="primary-btn">{loading ? "Verifying..." : "Login →"}</button>
                </div>}
                {authTab === "register" && <div>
                    <input value={regName} onChange={e => setRegName(e.target.value)} placeholder="Full Name" style={{ marginBottom: 12 }} />
                    <input value={regMail} onChange={e => setRegMail(e.target.value)} placeholder="Email" style={{ marginBottom: 12 }} />
                    <input value={regPhone} maxLength={10} onChange={e => setRegPhone(e.target.value)} placeholder="Phone" style={{ marginBottom: 12 }} />
                    <input type="password" value={regPass} onChange={e => setRegPass(e.target.value)} placeholder="Password" style={{ marginBottom: 12 }} />
                    <button disabled={loading} onClick={handleRegister} className="primary-btn">{loading ? "Creating..." : "Sign Up →"}</button>
                </div>}
                {authTab === "forgot" && <div>
                    <h3 style={{ marginBottom: 10 }}>Reset 🔑</h3>
                    <input value={fEmail} onChange={e => setFEmail(e.target.value)} placeholder="Enter Gmail" style={{ marginBottom: 15 }} />
                    <button onClick={handleForgotPass} className="primary-btn">Send Link</button>
                    <button onClick={() => setAuthTab("login")} style={{ width: "100%", marginTop: 15, background: "none", color: "#5e7d68" }}>← Back</button>
                </div>}
            </div>
        );

        return (
            <div style={{ paddingBottom: 100 }}>
                {toast && <Toast t={toast} />}
                {tab === "home" && <div style={{ padding: 25 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
                        <div><p style={{ color: "#5e7d68" }}>Hello,</p><h2 style={{ fontSize: 32 }}>{user?.name}</h2></div>
                        <div onClick={() => setTab("profile")} style={{ width: 55, height: 55, borderRadius: "50%", background: "#101a13", border: "1px solid #1b2d1f", fontSize: 26 }} className="flex-center">{user?.avatar}</div>
                    </div>
                    <div style={{ background: "#101a13", borderRadius: 24, padding: 25, marginTop: 30 }}><p style={{ color: "#5e7d68", fontSize: 11 }}>CALORIE TARGET</p><h3 style={{ color: "#4ade80", fontSize: 32 }}>2400 kcal</h3></div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 15, marginTop: 25 }}>
                        <button onClick={() => setTab("menu")} style={{ background: "#4ade80", padding: 20, borderRadius: 22, color: "#000", fontWeight: 900 }}>🍽 Order</button>
                        <button onClick={() => setTab("track")} style={{ background: "#101a13", padding: 20, borderRadius: 22, border: "1px solid #1b2d1f" }}>🛵 Track</button>
                    </div>
                    <h3 style={{ marginTop: 35 }}>Foods for You</h3>
                    <div style={{ display: "flex", gap: 15, overflowX: "auto", marginTop: 20 }}>
                        {foods.weight_loss.breakfast.map(i => <div key={i.id} style={{ minWidth: 160, background: "#101a13", borderRadius: 22, padding: 15 }}><div style={{ fontSize: 40, textAlign: "center" }}>{i.emoji}</div><p style={{ fontWeight: 800, marginTop: 10 }}>{i.name}</p><button onClick={() => addToCart(i)} style={{ background: "#4ade80", width: "100%", padding: 8, borderRadius: 10, marginTop: 10, color: "#000", fontWeight: 900 }}>+ Add</button></div>)}
                    </div>
                </div>}

                {tab === "profile" && <div style={{ padding: 25, textAlign: "center" }}>
                    <div style={{ fontSize: 80, margin: "40px 0" }}>{user?.avatar}</div>
                    <h2>{user?.name}</h2><p style={{ color: "#5e7d68" }}>{user?.email}</p>
                    <button onClick={signOut} className="primary-btn" style={{ background: "rgba(248,113,113,0.1)", color: "#f87171", marginTop: 40 }}>Sign Out 🚪</button>
                    {isAdmin && <button onClick={() => setTab("admin")} className="primary-btn" style={{ marginTop: 15 }}>Admin Panel ⚙️</button>}
                </div>}

                {/* Bottom Nav */}
                <div style={{ position: "fixed", bottom: 0, width: "100%", maxWidth: 430, background: "rgba(6,12,8,0.98)", display: "flex", justifyContent: "space-around", padding: "15px 0 35px", borderTop: "1px solid #1b2d1f" }}>
                    {[["home", "🏠"], ["menu", "🍽"], ["cart", "🛒"], ["track", "🛵"], ["profile", "👤"]].map(([k, ic]) => <button key={k} onClick={() => setTab(k)} style={{ background: "none", opacity: tab === k ? 1 : 0.3, fontSize: 24 }}>{ic}</button>)}
                </div>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(e => console.log(e)));
    }
</script>
</body>
</html>
