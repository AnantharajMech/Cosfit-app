*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

input,textarea,select{font-family:'Inter',sans-serif;box-sizing:border-box;-webkit-appearance:none;outline:none;border:none}

button:active{transform:scale(.92)!important;transition:transform .08s!important}

const COMPANY={name:"Coscoom Creative Tech Solutions",brand:"Idappadi Creators",email:"anantharajeinstein@gmail.com",phone:"8778148899",addr:"21/AJ,68,New Street,Kavandampatti,Idappadi,Salem-637101",state:"Tamilnadu"};
const GOALS=[{id:"weight_loss",label:"Weight Loss",icon:"вҡ–пёҸ",calMod:-500},{id:"muscle_gain",label:"Muscle Gain",icon:"рҹ’Ә",calMod:300},{id:"general",label:"Stay Fit",icon:"рҹҢҝ",calMod:0}];

// в”Җв”Җ API HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TK='cosfit_tk';
const ATK='cosfit_atk';
const getToken  = ()=>localStorage.getItem(TK)||'';
const setToken  = t=>t?localStorage.setItem(TK,t):localStorage.removeItem(TK);
const getAToken = ()=>localStorage.getItem(ATK)||'';
const setAToken = t=>t?localStorage.setItem(ATK,t):localStorage.removeItem(ATK);

const api = async (endpoint, opts={})=>{
  const tk = opts.admin ? getAToken() : getToken();
  const headers = {'Content-Type':'application/json', ...(tk?{Authorization:`Bearer ${tk}`}:{}), ...(opts.headers||{})};
  const res = await fetch(endpoint, {...opts, headers, body: opts.body?JSON.stringify(opts.body):undefined});
  const data = await res.json();
  if(!res.ok) throw new Error(data.error||`Request failed (${res.status})`);
  return data;
};

// в”Җв”Җ HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const tdee=(w,h,a,g,goal)=>{
  const bmr=g==="f"?10*w+6.25*h-5*a-161:10*w+6.25*h-5*a+5;
  return Math.round(bmr*1.55)+((GOALS.find(x=>x.id===goal))||{calMod:0}).calMod;
};
const getGreeting=(name,goal,orders)=>{
  const hr=new Date().getHours();
  const fn=name?.split(" ")[0]||"there";
  let greeting,icon,meal,tip,sticker;
  if(hr>=5&&hr<12){greeting="Good Morning";icon="вҳҖпёҸ";meal="breakfast";sticker="рҹҢ…";tip=goal==="weight_loss"?"Start light вҖ“ your detox smoothie awaits!":goal==="muscle_gain"?"Fuel up! High-protein breakfast time рҹ’Ә":"Kick off your day with a healthy breakfast!";}
  else if(hr>=12&&hr<17){greeting="Good Afternoon";icon="рҹҢӨ";meal="lunch";sticker="рҹҢһ";tip=goal==="weight_loss"?"Stay on track вҖ“ choose your low-cal lunch!":goal==="muscle_gain"?"Lunch = muscle building time! Eat big рҹ’Ә":"Keep your energy going вҖ“ it's lunch time!";}
  else if(hr>=17&&hr<21){greeting="Good Evening";icon="рҹҢҶ";meal="dinner";sticker="рҹҢҮ";tip=goal==="weight_loss"?"Light dinner = better sleep & weight loss!":goal==="muscle_gain"?"Recovery dinner вҖ“ protein is key tonight!":"Wind down with a nutritious dinner!";}
  else{greeting="Good Night";icon="рҹҢҷ";meal="dinner";sticker="рҹҢғ";tip="Light meal recommended for better sleep рҹҳҙ";}
  const loyalty=orders.length>=10?"рҹҸҶ Top customer!":orders.length>=5?"вӯҗ Loyal member!":orders.length>=2?"вңЁ Regular customer!":"";
  return{greeting,icon,meal,tip,sticker,loyalty,fn};
};
const getAITips=(user,orders)=>{
  const tips=[];const hr=new Date().getHours();if(!user)return[];
  if(orders.length===0)tips.push({icon:"рҹҺҜ",text:"Place your first order and start your fitness journey!",color:C.g});
  if(hr>=7&&hr<9)tips.push({icon:"вҡЎ",text:"Morning boost: Have breakfast within 1 hour of waking!",color:C.gold});
  if(user.goal==="weight_loss")tips.push({icon:"рҹ’§",text:"Drink 2-3L water today to support weight loss",color:C.blue});
  if(user.goal==="muscle_gain")tips.push({icon:"рҹҘ©",text:`Protein target: ${Math.round((+user.weight||70)*2.2)}g today`,color:C.pur});
  if(orders.length>0&&orders[0].status_idx<4)tips.push({icon:"рҹӣө",text:"Your latest order is being tracked live!",color:C.g});
  tips.push({icon:"рҹ“Ҡ",text:`Estimated ${Math.round(new Date().getHours()*65)} cal burned today`,color:C.g});
  return tips.slice(0,3);
};
const fmt=d=>new Date(d).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
let NID=800;const nid=()=>++NID;

// в”Җв”Җ MINI COMPONENTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Toast({t}){
  return <div style={{position:"fixed",top:22,left:"50%",transform:"translateX(-50%)",background:t.err?"rgba(248,113,113,.15)":"rgba(74,222,128,.12)",border:`1px solid ${t.err?"rgba(248,113,113,.5)":"rgba(74,222,128,.5)"}`,color:t.err?"#fca5a5":"#4ade80",padding:"12px 22px",borderRadius:50,fontWeight:700,fontSize:13,zIndex:9999,whiteSpace:"nowrap",maxWidth:"88vw",...F,animation:"toast .35s cubic-bezier(.34,1.56,.64,1) both",boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
    {t.msg}
  </div>;
}
function NBanner({n,onClose}){
  return <div onClick={onClose} style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:9990,background:"linear-gradient(135deg,#0c1610,#142019)",borderBottom:"1px solid rgba(74,222,128,.3)",padding:"14px 20px 16px",display:"flex",alignItems:"center",gap:12,animation:"notif .45s cubic-bezier(.34,1.56,.64,1) both",boxShadow:"0 12px 40px rgba(0,0,0,.6)",cursor:"pointer"}}>
    <div style={{width:44,height:44,background:"rgba(74,222,128,.15)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{n.icon}</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{color:C.g,fontWeight:800,fontSize:13,...N}}>{n.label}</div>
      <div style={{color:C.m,fontSize:12,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.msg}</div>
    </div>
    <div style={{color:C.m,fontSize:22,flexShrink:0}}>Г—</div>
  </div>;
}
function Sheet({onClose,children,tall}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:950,display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .2s both"}} onClick={onClose}>
    <div style={{background:C.surf,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:430,padding:"22px 22px 44px",animation:"slideUp .35s cubic-bezier(.34,1.56,.64,1)",maxHeight:tall?"94vh":"82vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{width:42,height:4,background:C.b,borderRadius:99,margin:"0 auto 20px"}}/>
      {children}
    </div>
  </div>;
}
function Field({label,value,onChange,type="text",ph="",rows,min,note}){
  const s={width:"100%",padding:"13px 16px",background:C.card,border:`1.5px solid ${value?"rgba(74,222,128,.5)":C.b}`,borderRadius:13,color:C.w,fontSize:14,...F,transition:"border-color .2s",boxSizing:"border-box"};
  return <div style={{width:"100%"}}>
    {label&&<div style={{fontSize:10,fontWeight:700,color:C.m,textTransform:"uppercase",letterSpacing:1.2,marginBottom:7,...F}}>{label}</div>}
    {rows?<textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={{...s,resize:"none",lineHeight:1.7}}/>
    :<input type={type} value={value} onChange={e=>onChange(type==="number"?+e.target.value:e.target.value)} placeholder={ph} min={min} style={s}/>}
    {note&&<div style={{fontSize:11,color:C.m,marginTop:5,...F}}>{note}</div>}
  </div>;
}
function Spinner(){return <div style={{width:18,height:18,border:"3px solid rgba(74,222,128,.2)",borderTopColor:C.g,borderRadius:"50%"}} className="spin"/>;}

function PlanModal({plan,onSave,onClose}){
  const blank={id:"p"+Date.now(),label:"",price:0,per:"month",save:"",hot:false,color:C.g,features:[""]};
  const[d,setD]=useState(plan?{...plan,features:[...plan.features]}:blank);
  const up=k=>v=>setD(p=>({...p,[k]:v}));
  const addFeat=()=>setD(p=>({...p,features:[...p.features,""]}));
  const updFeat=(i,v)=>setD(p=>{const f=[...p.features];f[i]=v;return{...p,features:f};});
  const delFeat=i=>setD(p=>({...p,features:p.features.filter((_,j)=>j!==i)}));
  const ok=d.label&&d.price>0;
  return <Sheet onClose={onClose} tall>
    <div style={{...N,color:C.g,fontWeight:900,fontSize:18,marginBottom:16}}>{plan?"вңҸпёҸ Edit Plan":"вһ• New Plan"}</div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Plan Name *" value={d.label} onChange={up("label")} ph="e.g. Weekly"/>
        <Field label="Price (вӮ№) *" value={d.price} onChange={up("price")} type="number" min={0}/>
        <Field label="Period" value={d.per} onChange={up("per")} ph="week / month / year"/>
        <Field label="Save Badge" value={d.save||""} onChange={v=>setD(p=>({...p,save:v||null}))} ph="Save 25%"/>
      </div>
      <button onClick={()=>setD(p=>({...p,hot:!p.hot}))} style={{padding:"12px",borderRadius:12,background:d.hot?"rgba(74,222,128,.12)":"transparent",border:`1.5px solid ${d.hot?C.g:C.b}`,color:d.hot?C.g:C.m,fontWeight:700,fontSize:13,...F}}>{d.hot?"вҳ… Popular":"вҳҶ Mark Popular"}</button>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:700,color:C.m,textTransform:"uppercase",letterSpacing:1.2,...F}}>Features</div>
          <button onClick={addFeat} style={{background:"rgba(74,222,128,.1)",border:"1px solid rgba(74,222,128,.3)",color:C.g,padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:700,...F}}>+ Add</button>
        </div>
        {d.features.map((f,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={f} onChange={e=>updFeat(i,e.target.value)} placeholder={`Feature ${i+1}`} style={{flex:1,padding:"10px 14px",background:C.card,border:`1.5px solid ${C.b}`,borderRadius:11,color:C.w,fontSize:13,...F,boxSizing:"border-box"}}/>
          <button onClick={()=>delFeat(i)} style={{background:"rgba(248,113,113,.12)",border:"none",color:C.r,width:34,height:34,borderRadius:10,fontSize:16,fontWeight:900,flexShrink:0}}>Г—</button>
        </div>)}
      </div>
      <div style={{display:"flex",gap:8,marginTop:6}}>
        <button onClick={onClose} style={{flex:1,background:"transparent",border:`1px solid ${C.b}`,color:C.m,padding:"13px",borderRadius:13,fontWeight:700,...F}}>Cancel</button>
        <button disabled={!ok} onClick={()=>ok&&onSave(d)} style={{flex:2,background:ok?C.gG:"#1a1a1a",color:ok?"#060c08":C.m,border:"none",padding:"13px",borderRadius:13,fontWeight:900,fontSize:14,...N}}>Save Plan вң“</button>
      </div>
    </div>
  </Sheet>;
}

function FoodModal({food,goalId,meal,onSave,onClose}){

  return <Sheet onClose={onClose} tall>

        <Field label="Calories *" value={d.cal} onChange={up("cal")} type="number" min={0}/>

        <Field label="Tag" value={d.tag} onChange={up("tag")} ph="Low Carb"/>
        <Field label="Prep Time" value={d.time} onChange={up("time")} ph="15m"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[["рҹ“Ұ In Stock","stock"],["рҹ‘Ғ Visible","active"]].map(([l,k])=><button key={k} onClick={()=>setD(p=>({...p,[k]:!p[k]}))} style={{padding:"12px",borderRadius:12,border:`1.5px solid ${d[k]?C.g:C.b}`,background:d[k]?"rgba(74,222,128,.1)":"transparent",color:d[k]?C.g:C.m,fontWeight:700,fontSize:13,...F}}>{d[k]?`вң“ ${l}`:`вң— ${l}`}</button>)}

      <div style={{background:C.b2,borderRadius:14,padding:"12px 14px",border:`1px solid ${C.b}`}}>
        <div style={{fontSize:9,color:C.m,textTransform:"uppercase",letterSpacing:1.2,marginBottom:8}}>Preview</div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:28}}>{d.emoji}</span>
          <div>
            <div style={{...N,color:C.w,fontWeight:800,fontSize:13}}>{d.name||"Item Name"}</div>
            <div style={{color:C.m,fontSize:11,marginTop:2}}>{d.desc||"Description"}</div>
            <div style={{display:"flex",gap:6,marginTop:5}}>
              <span style={{background:"rgba(251,146,60,.14)",color:C.o,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99}}>рҹ”Ҙ{d.cal}</span>
              <span style={{background:"rgba(74,222,128,.1)",color:C.g,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99}}>вӮ№{d.price}</span>
            </div>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={onClose} style={{flex:1,background:"transparent",border:`1px solid ${C.b}`,color:C.m,padding:"13px",borderRadius:13,fontWeight:700,...F}}>Cancel</button>
        <button disabled={!ok} onClick={()=>ok&&onSave(d)} style={{flex:2,background:ok?C.gG:"#1a1a1a",color:ok?"#060c08":C.m,border:"none",padding:"13px",borderRadius:13,fontWeight:900,fontSize:14,...N}}>Save вң“</button>
      </div>
    </div>
